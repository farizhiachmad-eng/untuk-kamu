<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Pertanyaan Terakhir ❤️</title>

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at top left,#ffd6ea 0%,transparent 35%),
    radial-gradient(circle at bottom right,#ff9fc6 0%,transparent 35%),
    linear-gradient(135deg,#ff5fa2,#ff77b7,#ff8fc8);

    color:white;
}

.container{
    position:relative;
    z-index:100;
}

.card{
    position:relative;
    z-index:10;
    width:340px;
    padding:35px;

    background:rgba(255,255,255,.18);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.3);

    border-radius:28px;

    text-align:center;

    color:white;

    box-shadow:
    0 20px 50px rgba(255,0,120,.25),
    inset 0 0 20px rgba(255,255,255,.15);
}
button{
    padding:14px 35px;
    border:none;
    border-radius:50px;

    background:linear-gradient(45deg,#ff2d75,#ff6aa9);

    color:white;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px #ff7bb7;
}

#yes{
    background:#ff2d75;
    color:white;
    margin-right: 8px;
}

#no{
    position:fixed;
    background:white;
    color:#ff2d75;
}

/* Glow Background */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle,#ffffff33 0%,transparent 60%);
    animation:glow 6s ease-in-out infinite;
    pointer-events:none;
}

@keyframes glow{
    0%,100%{opacity:.4;}
    50%{opacity:1;}
}

/* Overlay */
.overlay{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:1;
}

/* Card */
.card{
    position:relative;
    z-index:10;

    width:340px;
    padding:35px;

    background:rgba(255,255,255,.18);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.3);
    border-radius:28px;

    text-align:center;

    box-shadow:
    0 20px 50px rgba(255,0,120,.25),
    inset 0 0 20px rgba(255,255,255,.15);
}

.card h2{
    margin-bottom:15px;
}

.card p{
    line-height:1.6;
    margin-bottom:25px;
}

button{
    padding:14px 35px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff2d75,#ff6aa9);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px #ff7bb7;
}

/* Sakura */
.sakura{
    position:absolute;
    top:-50px;
    opacity:.8;
    animation:sakuraFall linear infinite;
    filter:drop-shadow(0 0 6px #ffc8de);
}

@keyframes sakuraFall{
    from{
        transform:translateY(-50px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) translateX(120px) rotate(720deg);
    }
}

/* Love */
.love{
    position:absolute;
    bottom:-50px;
    color:white;
    opacity:.7;
    animation:loveUp linear infinite;
    filter:drop-shadow(0 0 8px #ff8ac4);
}

@keyframes loveUp{
    from{
        transform:translateY(0) scale(.5);
    }
    to{
        transform:translateY(-120vh) scale(1.4);
        opacity:0;
    }
}

/* Bubble */
.bubble{
    position:absolute;
    bottom:-60px;
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.4);
    border-radius:50%;
    backdrop-filter:blur(3px);
    animation:bubbleUp linear infinite;

    box-shadow:
    inset 0 0 10px rgba(255,255,255,.35),
    0 0 12px rgba(255,255,255,.2);
}

@keyframes bubbleUp{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Star */
.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite;

    box-shadow:
    0 0 8px white,
    0 0 15px white;
}

@keyframes twinkle{
    0%,100%{
        opacity:.2;
        transform:scale(.6);
    }
    50%{
        opacity:1;
        transform:scale(1.8);
    }
}
</style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<div class="container">
<div class="card">

<h2>❤️ Pertanyaan Terakhir ❤️</h2>

<p>
Kalau setelah membaca semuanya,
how menurutmu?

Kalau kamu juga ingin mencoba menjalani hubungan denganku,
tekan tombol <b>Iya ❤️</b>.

Kalau kamu belum siap, tidak apa-apa. 😊
</p>

<button id="yes">Iya ❤️</button>
<button id="no">gamauu 😊</button>

</div>
</div>

<!-- Fullscreen overlay that can show celebration / message -->
<div id="overlay-celebration">
  <div id="sakura-celebration"></div>
  <div class="content">
    <h2>Yay! ❤️</h2>
    <p> illooveeyouuu 💕</p>
  </div>
</div>

<script>
// playful evasive 'no' button
const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{
    // limit to viewport so it won't go off-screen
    const x = Math.random()*70 + 5; // 5%..75%
    const y = Math.random()*70 + 10; // 10%..80%

    no.style.left = x + "%";
    no.style.top = y + "%";

});

// Function to create sakura petals
function createSakuraPetals(container, count = 30) {
    for (let i = 0; i < count; i++) {
        const sakura = document.createElement('div');
        sakura.className = `sakura speed-${(i % 5) + 1}`;
        sakura.style.left = Math.random() * 100 + '%';
        sakura.style.animationDelay = Math.random() * 0.5 + 's';
        container.appendChild(sakura);
    }
}

// Yes click: show overlay with sakura, then redirect to WA
const yesBtn = document.getElementById('yes');
const overlayElement = document.getElementById('overlay-celebration');
const sakuraCelebration = document.getElementById('sakura-celebration');

yesBtn.addEventListener('click', async () => {
    overlayElement.classList.add('show');
    
    // Create sakura petals in overlay
    createSakuraPetals(sakuraCelebration, 30);

    // little delay so user sees overlay + sakura
    setTimeout(()=>{
        const nomor="6282185052636"; // Ganti dengan nomor WhatsApp kamu
        const pesan=encodeURIComponent("illoveyou too ❤️❤️");
        window.location.href=`https://wa.me/${nomor}?text=${pesan}`;
    },1400);
});

</script>

<!-- Include sakura script -->
<script src="sakura.js"></script>

</body>
</html>
