<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu ❤️</title>

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at top left,#ffd6ea 0%,transparent 35%),
    radial-gradient(circle at bottom right,#ff9fc6 0%,transparent 35%),
    linear-gradient(135deg,#ff5fa2,#ff77b7,#ff8fc8);

    color:white;
}

.card{
    position:relative;
    z-index:10;
    width:340px;
    padding:35px;

    background:rgba(255,255,255,.18);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.3);

    border-radius:28px;

    text-align:center;

    color:white;

    box-shadow:
    0 20px 50px rgba(255,0,120,.25),
    inset 0 0 20px rgba(255,255,255,.15);
}

button{
    padding:14px 35px;
    border:none;
    border-radius:50px;

    background:linear-gradient(45deg,#ff2d75,#ff6aa9);

    color:white;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px #ff7bb7;
}

/* ===== Overlay Premium ===== */

.overlay{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
}

/* Sakura */

.sakura{
    position:absolute;
    top:-50px;
    opacity:.8;
    animation:sakuraFall linear infinite;
}

@keyframes sakuraFall{
    0%{
        transform:translateY(-50px) rotate(0deg);
    }
    100%{
        transform:translateY(110vh) translateX(120px) rotate(720deg);
    }
}

/* Love */

.love{
    position:absolute;
    bottom:-50px;
    color:#fff;
    opacity:.7;
    animation:loveUp linear infinite;
}

@keyframes loveUp{
    from{
        transform:translateY(0) scale(.5);
    }
    to{
        transform:translateY(-120vh) scale(1.4);
        opacity:0;
    }
}

/* Bubble */

.bubble{
    position:absolute;
    bottom:-60px;
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.4);
    border-radius:50%;
    backdrop-filter:blur(3px);
    animation:bubbleUp linear infinite;
}

@keyframes bubbleUp{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Star */

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
    0%,100%{
        opacity:.2;
        transform:scale(.6);
    }
    50%{
        opacity:1;
        transform:scale(1.8);
    }
}

/* Glow */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle,#ffffff33 0%,transparent 60%);
    animation:glow 6s ease infinite;
    pointer-events:none;
}

@keyframes glow{
    0%,100%{
        opacity:.4;
    }
    50%{
        opacity:1;
    }
}
</style>
</head>
<body>

<script>
const overlay=document.getElementById("overlay");

// Sakura
for(let i=0;i<18;i++){
    let s=document.createElement("div");
    s.className="sakura";
    s.innerHTML="🌸";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(8+Math.random()*6)+"s";
    s.style.animationDelay=Math.random()*8+"s";
    s.style.fontSize=(16+Math.random()*18)+"px";
    overlay.appendChild(s);
}

// Love
for(let i=0;i<15;i++){
    let h=document.createElement("div");
    h.className="love";
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(6+Math.random()*5)+"s";
    h.style.animationDelay=Math.random()*6+"s";
    h.style.fontSize=(15+Math.random()*25)+"px";
    overlay.appendChild(h);
}

// Bubble
for(let i=0;i<25;i++){
    let b=document.createElement("div");
    b.className="bubble";
    let size=10+Math.random()*30;
    b.style.width=size+"px";
    b.style.height=size+"px";
    b.style.left=Math.random()*100+"vw";
    b.style.animationDuration=(10+Math.random()*6)+"s";
    b.style.animationDelay=Math.random()*5+"s";
    overlay.appendChild(b);
}

// Star
for(let i=0;i<70;i++){
    let st=document.createElement("div");
    st.className="star";
    st.style.left=Math.random()*100+"vw";
    st.style.top=Math.random()*100+"vh";
    st.style.animationDelay=Math.random()*2+"s";
    overlay.appendChild(st);
}
</script>

<div class="overlay" id="overlay"></div>

<div class="card">
    <h2>❤️ Hai Kamu ❤️</h2>
    <p>nama kamu aulia hazma putri kan, 
    maaf jika aku salah mengetik nama kamu,
    aku mau ngungkapin sesuatu🥰</p>
    <button onclick="nextPage()">Klik di Sini ❤️</button>
</div>

<script>
function nextPage(){
    const btn = document.querySelector("button");
    btn.innerHTML = "Membuka...";
    btn.disabled = true;
    setTimeout(function(){
        window.location.href = "halaman2.html";
    },1500);
}
</script>

</body>
</html>
